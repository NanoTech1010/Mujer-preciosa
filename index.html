<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para una Mujer Excepcional</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <style>
        :root {
            --primary-glow: #00d4ff;
            --secondary-glow: #ff007f;
            --bg-dark: #0a0a0c;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* Contenedor de Partículas */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        /* Diseño de Cristalismo */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
            padding: 2.5rem;
            text-align: center;
            max-width: 600px;
            margin: 10% auto;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            background: linear-gradient(to right, var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--primary-glow);
            border-radius: 50px;
            font-size: 0.8rem;
            color: var(--primary-glow);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            line-height: 1.6;
            color: #d1d1d1;
            font-weight: 300;
        }

        .highlight {
            color: var(--secondary-glow);
            font-weight: 500;
        }

        /* Botón Interactiva */
        .btn-action {
            margin-top: 30px;
            padding: 12px 30px;
            background: transparent;
            border: 1px solid var(--secondary-glow);
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn-action:hover {
            background: var(--secondary-glow);
            box-shadow: 0 0 20px var(--secondary-glow);
            transform: scale(1.05);
        }

        /* Animaciones */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .console-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            color: #00ff41;
            margin-top: 20px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="glass-card">
        <div class="status-badge">System Status: Admiring You</div>
        <h1>FELIZ DÍA DE LA MUJER</h1>
        <p>
            En este <span class="highlight">8 de marzo</span>, quería dedicarte algo que combine mi mundo con tu esencia. 
            Eres la <span class="highlight">arquitectura perfecta</span> de inteligencia, fuerza y determinación.
        </p>
        
        <div class="console-text" id="typewriter">
            </div>

        <button class="btn-action" onclick="mostrarSorpresa()">EJECUTAR PROTOCOLO: ADMIRACIÓN</button>
    </div>

    <script>
        // Configuración de partículas
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 100 },
                "color": { "value": "#ff007f" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3 },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#00d4ff",
                    "opacity": 0.4,
                    "width": 1
                },
                "move": { "speed": 2 }
            }
        });

        // Efecto Typewriter (Toque de consola)
        const txt = "> Analizando virtudes...\n> Inteligencia: Máxima\n> Impacto en mi vida: 100%\n> Eres increíble.";
        let i = 0;
        function typeWriter() {
            if (i < txt.length) {
                document.getElementById("typewriter").innerHTML += txt.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }
        window.onload = typeWriter;

        function mostrarSorpresa() {
            alert("Acceso concedido al corazón. \n\nEres el algoritmo más bello que he tenido el placer de conocer.");
        }
    </script>
</body>
</html>
